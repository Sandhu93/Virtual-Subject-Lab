# RunPod deployment overlay.
#
# Usage (from repo root, after SSH-ing into the pod):
#   docker compose -f infra/compose.yaml -f infra/compose.runpod.yaml up -d --build
#
# Prerequisites:
#   - A .env file exists at the repo root (copy from .env.runpod.example).
#   - HF_TOKEN is set in .env (needed to download gated LLaMA 3.2-3B on first run).
#   - /workspace/tribe-weights exists (RunPod network volume mount point).
#
# Port access on RunPod:
#   Frontend  → https://<pod-id>-3000.proxy.runpod.net   (nginx, proxies /api/ internally)
#   API docs  → https://<pod-id>-8000.proxy.runpod.net/docs
#   MinIO     → https://<pod-id>-9001.proxy.runpod.net

services:
  api:
    env_file:
      - ../.env

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker-gpu.Dockerfile
    env_file:
      - ../.env
    volumes:
      # /workspace is the RunPod network volume — persists across pod restarts.
      # tribe-weights: extracted multimodal feature cache (TRIBE_CACHE_DIR).
      # hf-cache: HuggingFace hub model weights (~16 GB, downloaded on first run).
      #   Without this mount, weights re-download on every pod restart.
      - /workspace/tribe-weights:/app/.cache/tribe
      - /workspace/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    env_file:
      - ../.env
