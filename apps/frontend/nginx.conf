server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/ requests to the API service on the internal Docker network.
    # This keeps the browser on a single origin (no CORS) and works on RunPod
    # where each exposed port has a different proxy hostname.
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Generous timeout: export downloads and long polling can take minutes.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — any unmatched path serves index.html so the hash router works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
